<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e252e">
  <title>Форма монеты · Каталог монет</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="images/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <img class="brand__mark" src="images/logo.png" alt="">
        <div>
          <h1 id="formTitle" class="brand__title">Монета</h1>
          <p id="formSubtitle" class="brand__subtitle">—</p>
        </div>
      </div>
      <div class="header-tools">
        <div class="currency-panel" aria-label="Курсы валют">
          <div class="currency-panel__rates">
            <span>EUR: <strong id="eurRate">—</strong></span>
            <span>USD: <strong id="usdRate">—</strong></span>
          </div>
          <label class="currency-panel__selector">
            <span>Валюта</span>
            <select id="currencySelect" class="select-field select-field--compact" aria-label="Валюта отображения">
              <option value="EUR">EUR €</option>
              <option value="USD">USD $</option>
              <option value="BYN">BYN Br</option>
            </select>
          </label>
        </div>
        <nav class="actions" aria-label="Действия">
          <a class="link-button" href="index.html">В каталог</a>
          <a class="link-button" href="index.html#/stats">Статистика</a>
          <button id="deleteButton" class="button button--danger hidden" type="button">Удалить</button>
        </nav>
      </div>
    </header>

    <p id="statusMessage" class="notice hidden"></p>

    <form id="coinForm" class="form-layout">
      <div id="formSections"></div>
      <div class="form-actions">
        <a class="link-button" href="index.html">Отмена</a>
        <button class="button button--accent" type="submit">Сохранить</button>
      </div>
    </form>
  </main>

  <script src="js/db.js"></script>
  <script src="js/issuers.js"></script>
  <script src="js/file-system.js"></script>
  <script src="js/currency.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/drafts.js"></script>
  <script src="js/app.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
